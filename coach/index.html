<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!--
    /coach/ consolidated into Dating Studio product page at /playbook/
    per Paul Q1 ratification (2026-04-23 eve). 302-semantic redirect via meta-refresh for
    GitHub Pages static hosting (flip to 301 after 30-day observation per Q2).
    Reversible via `git revert` of the Job 2 commit.
  -->
  <title>MatchMakers</title>
  <meta name="description" content="The Dating Coach is now part of Dating Studio. Redirecting to /playbook/.">
  <link rel="canonical" href="https://matchmakersusa.com/playbook/">
  <meta http-equiv="refresh" content="0; url=/playbook/">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png">
  <style>
    body{margin:0;padding:0;background:#05090F;color:#C2D1E0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .redirect-box{max-width:480px;}
    .redirect-box h1{font-family:Georgia,serif;font-weight:300;font-size:clamp(1.4rem,3vw,2rem);color:#F8FAFC;margin:0 0 1rem;letter-spacing:-.01em;}
    .redirect-box p{font-size:.92rem;line-height:1.7;color:#7A95AF;margin:0 0 1.5rem;}
    .redirect-box a{display:inline-block;padding:.85rem 1.75rem;background:#C9A84C;color:#05090F;text-decoration:none;font-weight:700;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;border-radius:6px;transition:opacity .2s;}
    .redirect-box a:hover{opacity:.88;}
  </style>
  <script>
    // Client-side fallback redirect (in addition to meta-refresh) for robustness.
    if (typeof window !== 'undefined') {
      window.location.replace('/playbook/');
    }
  </script>
</head>
<body>
  <div class="redirect-box">
    <h1>Dating Studio</h1>
    <p>The Dating Coach is now part of Dating Studio. You're being redirected to the new page.</p>
    <p><a href="/playbook/">Continue to Dating Studio →</a></p>
  </div>
</body>
</html>

<!DOCTYPE html>
<!--
  OG image template for matchmakersusa.com link sharing previews.
  Renders at 1200x630 into img/og-image.png via:
      node img/render-og.mjs
  Design goals (locked 2026-04-17):
  - Only wordmark + URL + hero title "Take Dating to the Next Level"
  - Hero title dominates; minimal surrounding navy
  - No tagline, no stats row
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG image template — matchmakersusa.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #050A10;
      --gold: #C9A84C;
      --white: #F5F1E8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--navy);
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 80px;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--white);
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 520px at 50% 55%, rgba(201, 168, 76, 0.09), transparent 70%),
        radial-gradient(ellipse 1400px 700px at 50% 50%, rgba(255, 255, 255, 0.03), transparent 70%);
      pointer-events: none;
    }
    .wordmark-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 38px;
      letter-spacing: 0.02em;
      color: var(--white);
      opacity: 0.92;
    }
    .wordmark sup {
      font-size: 0.4em;
      vertical-align: super;
      margin-left: 2px;
      opacity: 0.7;
    }
    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      opacity: 0.7;
    }
    .url {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.28em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .hero {
      margin-top: 40px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 132px;
      line-height: 1.02;
      letter-spacing: -0.015em;
      text-align: center;
      color: var(--white);
      z-index: 1;
    }
    .hero .accent {
      font-style: italic;
      color: var(--gold);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wordmark-block">
    <div class="wordmark">MatchMakers<sup>&trade;</sup></div>
    <div class="divider"></div>
    <div class="url">matchmakersusa.com</div>
  </div>
  <h1 class="hero">
    Take Dating to the<br>
    <span class="accent">Next Level</span>
  </h1>
</body>
</html>
